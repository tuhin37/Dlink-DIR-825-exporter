name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '\n\r ')
          echo "current=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump patch
        id: bump
        run: |
          V="${{ steps.version.outputs.current }}"
          CLEAN="${V#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN"
          PATCH=$((PATCH + 1))
          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "Bumping $V → $NEW"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # --- Exporter image ---
      - name: Build and push exporter
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dlink-dir-825-exporter:${{ steps.bump.outputs.new }}
            ${{ secrets.DOCKER_USERNAME }}/dlink-dir-825-exporter:latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Browser service image ---
      - name: Build and push browser-service
        uses: docker/build-push-action@v5
        with:
          context: ./docker/browser-service
          file: ./docker/browser-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dlink-browser-service:${{ steps.bump.outputs.new }}
            ${{ secrets.DOCKER_USERNAME }}/dlink-browser-service:latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Update VERSION + create git tag ---
      - name: Commit VERSION bump and tag
        run: |
          echo "${{ steps.bump.outputs.new }}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Bump version to ${{ steps.bump.outputs.new }}"
          git tag ${{ steps.bump.outputs.new }}
          git push origin main --tags
